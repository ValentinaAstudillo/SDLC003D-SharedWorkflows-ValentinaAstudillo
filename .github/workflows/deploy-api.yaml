name: Subir la API a Docker Hub (v3 con tests)

on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
      image-tag:
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true

jobs:
  deps-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar tests
        run: npm test

  build-and-push:
    needs: deps-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push
        run: |
          IMAGE="${{ secrets.DOCKER_USERNAME }}/${{ inputs.image-name }}"
          docker build -t "$IMAGE:${{ inputs.image-tag }}" -t "$IMAGE:latest" .
          docker push -a "$IMAGE"